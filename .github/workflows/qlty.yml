name: Code Quality

on: [push, pull_request]

jobs:
  qlty:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Установка зависимостей проекта перед тестами
      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Qlty CLI
        uses: qltysh/qlty-action/install@v1

      # Запуск проверки (теперь плагин подтянет зависимости из package.json)
      - name: Execute Code Quality Check
        run: qlty check --all
