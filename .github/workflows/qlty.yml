name: Code Quality

on: [push, pull_request]

jobs:
  qlty:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Устанавливаем официальный бесплатный CLI инструмент
      - name: Install Qlty CLI
        run: curl https://qlty.sh | sh

      # Запускаем локальный анализ БЕЗ отправки токенов в облако
      - name: Run Qlty Analysis
        run: qlty run
